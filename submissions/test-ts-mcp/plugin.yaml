schema_version: 2
name: test-ts-mcp
version: "0.1.0"
description: "Test TypeScript MCP server for build pipeline verification"
author:
  name: "Plugin Store Team"
  github: "yz06276"
license: MIT
category: utility
tags: [test, typescript, mcp]
components:
  skill:
    dir: skills/test-ts-mcp
  mcp:
    type: binary
    command: test-ts-mcp
    args: ["--stdio"]
build:
  lang: typescript
  source_repo: "yz06276/plugin-build-tests"
  source_commit: "342756ee25405b5ec5b375a37c1b36710d5b9cd6"
  source_dir: "ts-mcp"
  binary_name: test-ts-mcp
  main: src/index.ts
permissions:
  wallet:
    read_balance: false
    send_transaction: false
    sign_message: false
    contract_call: false
  network:
    onchainos_commands: ["token search"]
  chains: [ethereum]
